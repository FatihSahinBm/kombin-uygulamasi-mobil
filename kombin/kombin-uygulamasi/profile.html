<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kombin.AI | Profilim</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script type="module">
        import { auth } from './js/auth.js';
        auth.requireAuth();
        window.logout = () => auth.logout();
    </script>
    <style>
        .profile-header {
            display: flex;
            align-items: flex-start;
            gap: 4rem;
            padding: 2.5rem 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
        }
        .profile-avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            font-size: 3.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 2px solid var(--border-color);
            overflow: hidden;
        }
        .profile-meta { flex: 1; padding-top: 0.5rem; }
        .profile-username {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            color: var(--text-primary);
        }
        .profile-stats {
            display: flex;
            gap: 2.5rem;
            margin-bottom: 1.2rem;
        }
        .profile-stat { text-align: center; }
        .profile-stat strong { display: block; font-size: 1.1rem; font-weight: 700; color: var(--text-primary); }
        .profile-stat span { font-size: 0.85rem; color: var(--text-muted); }
        .profile-bio { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.8rem; }
        .profile-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .profile-tag {
            background: var(--secondary-color);
            color: var(--text-secondary);
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .profile-actions { display: flex; gap: 0.8rem; margin-top: 1rem; }
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
        }
        @media (max-width: 600px) {
            .profile-header { flex-direction: column; gap: 1.2rem; text-align: center; }
            .profile-stats { justify-content: center; }
            .profile-grid { grid-template-columns: repeat(2, 1fr); }
            .profile-actions { justify-content: center; }
        }
        .profile-post-cell {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            background: var(--secondary-color);
            cursor: pointer;
        }
        .profile-post-cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.25s;
        }
        .profile-post-cell:hover img { transform: scale(1.06); }
        .profile-post-cell .post-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            opacity: 0;
            transition: opacity 0.2s;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .profile-post-cell:hover .post-overlay { opacity: 1; }
        .empty-posts {
            grid-column: 1/-1;
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-muted);
        }
        .tab-bar {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 1rem;
        }
        .tab-btn {
            flex: 1;
            padding: 0.8rem;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            border-bottom-color: var(--text-primary);
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Kombin.AI</div>
            <ul class="nav-links">
                <li><a href="dashboard.html">Ana Sayfa</a></li>
                <li><a href="wardrobe.html">Gardırobum</a></li>
                <li><a href="outfits.html">Kombin Oluştur</a></li>
                <li><a href="social.html">Sosyal Akış</a></li>
                <li><a href="profile.html" class="active">Profil</a></li>
                <li><a href="#" onclick="logout(); return false;" style="color: var(--accent-color);">Çıkış Yap</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-container fade-in" style="max-width: 900px;">

        <!-- Profil Header -->
        <div class="profile-header" id="profile-header">
            <div class="profile-avatar" id="profile-avatar">?</div>
            <div class="profile-meta">
                <div class="profile-username" id="profile-username">Yükleniyor...</div>
                <div class="profile-stats">
                    <div class="profile-stat">
                        <strong id="stat-posts">0</strong>
                        <span>Gönderi</span>
                    </div>
                    <div class="profile-stat" style="cursor: pointer;" id="stat-followers-container">
                        <strong id="stat-followers">0</strong>
                        <span>Takipçi</span>
                    </div>
                    <div class="profile-stat" style="cursor: pointer;" id="stat-following-container">
                        <strong id="stat-following">0</strong>
                        <span>Takip</span>
                    </div>
                    <div class="profile-stat" style="display:none;">
                        <strong id="stat-wardrobe">0</strong>
                        <span>Kıyafet</span>
                    </div>
                </div>
                <div class="profile-tags" id="profile-tags"></div>
                <div class="profile-actions" id="profile-actions">
                    <button class="btn btn-secondary" style="font-size:0.9rem;padding:0.5rem 1.2rem;" id="btn-edit-profile">Profili Düzenle</button>
                    <button class="btn btn-secondary" style="font-size:0.9rem;padding:0.5rem 1.2rem; display:none;" id="btn-settings" title="Fiziksel Özellikler ve Tercihler">⚙️ Ayarlar</button>
                    <a href="social.html?action=new_post" class="btn" style="background-color: #e60023; color: white; border: none; border-radius: 24px; font-weight: bold; font-size:0.9rem;padding:0.5rem 1.2rem; display:inline-flex; align-items:center; transition: all 0.2s;" id="btn-share-post" onmouseover="this.style.backgroundColor='#ad081b'; this.style.transform='translateY(-2px)'" onmouseout="this.style.backgroundColor='#e60023'; this.style.transform='none'">
                        <span class="icon" style="margin-right: 0.4rem; display: inline-flex; align-items: center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span> Paylaşım Yap
                    </a>
                    <button class="btn btn-primary" id="btn-follow" style="display:none; font-size:0.9rem;padding:0.5rem 1.2rem;">Takip Et</button>
                    <button class="btn btn-secondary" id="btn-unfollow" style="display:none; font-size:0.9rem;padding:0.5rem 1.2rem;">Takibi Bırak</button>
                </div>
            </div>
        </div>

        <!-- Tab Bar -->
        <div class="tab-bar">
            <button class="tab-btn active" id="tab-posts">Kombinler</button>
            <button class="tab-btn" id="tab-saved" style="display:none;">Kaydedilenler</button>
        </div>

        <!-- Post Grid -->
        <div class="profile-grid" id="profile-grid">
            <div class="empty-posts">
                <div style="font-size:2.5rem;margin-bottom:0.8rem;">📷</div>
                <p>Yükleniyor...</p>
            </div>
        </div>

        <div id="profile-post-modal" class="modal">
            <div class="post-modal-content" style="max-width: 900px;">
                <div class="post-modal-image-col" style="position:relative;">
                    <img id="profile-detail-image" src="" alt="Post">
                </div>
                <div class="post-modal-info-col" style="position:relative;">
                    <span class="close-btn" id="close-profile-post-modal" style="position: absolute; top: 1rem; right: 1.5rem; font-size: 2.5rem; line-height: 1; z-index: 10;">&times;</span>
                    <div style="padding: 1.2rem 1.5rem 1rem;">
                        <p id="profile-detail-description" style="color:var(--text-primary);white-space:pre-wrap;margin:0;"></p>
                    </div>

                    <div id="profile-comments-section" style="flex: 1; overflow-y: auto; max-height: 320px; padding: 0 1.5rem 1rem;">
                        <h3 style="font-size: 1.05rem; margin-bottom: 0.8rem; font-weight: 700; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Yorumlar</h3>
                        <div id="profile-comments-list" style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <p style="color: var(--text-muted); font-size: 0.95rem; font-style: italic; text-align: center; margin-top: 1.2rem;">Yorumlar yükleniyor...</p>
                        </div>
                    </div>

                    <div style="padding: 1rem 1.5rem 1.2rem; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 0.9rem; position: sticky; bottom: 0; background: var(--surface-color); box-shadow: 0 -4px 10px rgba(0,0,0,0.03); z-index: 5;">
                        <div style="display: flex; gap: 1rem; align-items: center;">
                            <button class="action-btn like-btn" id="profile-detail-like-btn" style="font-size: 1.4rem; padding: 0; display: inline-flex; align-items: center; background: none; border: none; cursor: pointer; color: var(--text-primary);">
                                <span class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></span>
                                <strong id="profile-detail-likes-count" style="margin-left: 0.3rem; font-size: 1.1rem;">0</strong>
                            </button>
                            <span id="profile-detail-comments-count" style="font-weight:700;">💬 0</span>
                        </div>

                        <div style="display: flex; gap: 0.8rem; align-items: center;">
                            <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--secondary-color); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--text-secondary);"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
                            <input type="text" id="profile-comment-input" placeholder="Yorum ekle..." style="flex: 1; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-primary); border-radius: 24px; padding: 0.8rem 1.2rem; font-family: inherit; font-size: 0.95rem; outline: none;">
                            <button id="profile-send-comment-btn" style="background: transparent; border: none; cursor: pointer; color: var(--primary-color); padding: 0.5rem; display: inline-flex; align-items: center;" title="Gönder">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Follow List Modal -->
        <div id="follow-modal" class="modal">
            <div class="follow-modal-content" style="width: 100%; max-width: 400px; padding: 0; position: relative; background: var(--surface-color); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.15);">
                <div style="padding: 1.5rem 1.5rem 1rem; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 1rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h3 id="follow-modal-title" style="margin: 0; font-size: 1.25rem; font-weight: 700; color: var(--text-primary);">Takipçiler</h3>
                        <span class="close-btn" id="close-follow-modal" style="font-size: 2rem; cursor: pointer; line-height: 1; color: var(--text-muted); transition: color 0.2s;">&times;</span>
                    </div>
                    <div style="position: relative;">
                        <input type="text" id="follow-search-input" placeholder="Kişilerde ara..." style="width: 100%; padding: 0.7rem 1rem 0.7rem 2.5rem; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-primary); font-family: inherit; font-size: 0.9rem; outline: none; box-sizing: border-box;">
                        <svg style="position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </div>
                </div>
                <div id="follow-list-container" style="max-height: 60vh; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.8rem;">
                    <!-- Items will be injected here -->
                </div>
            </div>
        </div>

        <!-- Edit Profile Modal -->
        <div id="edit-profile-modal" class="modal">
            <div class="modal-content" style="max-width: 400px;">
                <div class="modal-header">
                    <h2>Profili Düzenle</h2>
                    <span class="close-btn" id="close-edit-profile-modal">&times;</span>
                </div>
                <div class="modal-body">
                    <form id="edit-profile-form">
                        <div class="form-group" style="text-align: center; margin-bottom: 1.5rem;">
                            <label for="profile-avatar-input" style="cursor: pointer; display: inline-block; position: relative;">
                                <div id="edit-avatar-preview-container" style="width: 100px; height: 100px; border-radius: 50%; overflow: hidden; border: 2px solid var(--border-color); background: var(--primary-color); color: white; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold;">
                                    <span id="edit-avatar-initial">?</span>
                                    <img id="edit-avatar-preview" src="" alt="Avatar" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                                </div>
                                <div style="position: absolute; bottom: 0; right: 0; background: var(--primary-color); color: white; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--surface-color);">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                                </div>
                            </label>
                            <input type="file" id="profile-avatar-input" accept="image/*" style="display: none;">
                        </div>
                        
                        <!-- Cropper Alanı (Gizli Başlar) -->
                        <div id="cropper-container" style="display: none; margin-bottom: 1.5rem; background: var(--bg-color); border-radius: 8px; padding: 1rem;">
                            <div style="max-height: 300px; overflow: hidden; border-radius: 8px; margin-bottom: 1rem;">
                                <img id="cropper-image" src="" style="max-width: 100%; display: block;">
                            </div>
                            <div style="display: flex; gap: 0.8rem; justify-content: center;">
                                <button type="button" class="btn btn-secondary" id="crop-cancel-btn" style="flex: 1;">İptal</button>
                                <button type="button" class="btn btn-primary" id="crop-save-btn" style="flex: 1;">Kırp ve Onayla</button>
                            </div>
                        </div>

                        <div class="form-group" id="profile-name-group">
                            <label for="profile-name-input">İsim</label>
                            <input type="text" id="profile-name-input" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="profile-bio-input">Biyografi</label>
                            <textarea id="profile-bio-input" class="form-control" rows="3" placeholder="Kendinden biraz bahset..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block" id="submit-edit-profile-btn">Kaydet</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal">
            <div class="modal-content" style="max-width: 600px; max-height: 90vh; overflow-y: auto;">
                <div class="modal-header">
                    <h2>Fiziksel Özellikler & Tercihler</h2>
                    <span class="close-btn" id="close-settings-modal">&times;</span>
                </div>
                <div class="modal-body">
                    <form id="settings-form">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem;">
                            <div class="form-group">
                                <label for="settings-gender">Cinsiyet</label>
                                <select id="settings-gender" class="form-control" name="gender" required>
                                    <option value="erkek">Erkek</option>
                                    <option value="kadin">Kadın</option>
                                    <option value="unisex">Belirtmek İstemiyorum</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="settings-age">Yaş</label>
                                <input type="number" id="settings-age" class="form-control" name="age" min="15" max="99" required>
                            </div>
                            <div class="form-group">
                                <label for="settings-height">Boy (cm)</label>
                                <input type="number" id="settings-height" class="form-control" name="height" min="100" max="250" required>
                            </div>
                            <div class="form-group">
                                <label for="settings-weight">Kilo (kg)</label>
                                <input type="number" id="settings-weight" class="form-control" name="weight" min="30" max="200" required>
                            </div>
                            <div class="form-group">
                                <label for="settings-bodyType">Vücut Tipi</label>
                                <select id="settings-bodyType" class="form-control" name="bodyType" required>
                                    <option value="rectangle">Dikdörtgen</option>
                                    <option value="triangle">Üçgen</option>
                                    <option value="invertedTriangle">Ters Üçgen</option>
                                    <option value="hourglass">Kum Saati</option>
                                    <option value="round">Yuvarlak / Elma</option>
                                    <option value="unknown">Belirtmek İstemiyorum</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="settings-skinTone">Ten Rengi</label>
                                <select id="settings-skinTone" class="form-control" name="skinTone" required>
                                    <option value="fair">Açık / Beyaz Ten</option>
                                    <option value="medium">Buğday / Kumral Ten</option>
                                    <option value="olive">Esmer / Zeytin Ten</option>
                                    <option value="dark">Koyu / Siyahi Ten</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="settings-eyeColor">Göz Rengi</label>
                                <select id="settings-eyeColor" class="form-control" name="eyeColor" required>
                                    <option value="brown">Kahverengi</option>
                                    <option value="blue">Mavi</option>
                                    <option value="green">Yeşil</option>
                                    <option value="hazel">Ela</option>
                                    <option value="black">Siyah</option>
                                    <option value="unknown">Belirtmek İstemiyorum</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="settings-hairColor">Saç Rengi</label>
                                <select id="settings-hairColor" class="form-control" name="hairColor" required>
                                    <option value="black">Siyah</option>
                                    <option value="brown">Kahverengi</option>
                                    <option value="blonde">Sarışın</option>
                                    <option value="auburn">Kızıl</option>
                                    <option value="grey">Gri / Beyaz</option>
                                    <option value="unknown">Belirtmek İstemiyorum</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="settings-hairType">Saç Yapısı</label>
                                <select id="settings-hairType" class="form-control" name="hairType" required>
                                    <option value="straight">Düz</option>
                                    <option value="wavy">Dalgalı</option>
                                    <option value="curly">Kıvırcık</option>
                                    <option value="coily">Çok Kıvırcık / Afro</option>
                                    <option value="unknown">Belirtmek İstemiyorum</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="settings-faceShape">Yüz Şekli</label>
                                <select id="settings-faceShape" class="form-control" name="faceShape" required>
                                    <option value="oval">Oval</option>
                                    <option value="round">Yuvarlak</option>
                                    <option value="square">Kare</option>
                                    <option value="heart">Kalp</option>
                                    <option value="diamond">Elmas</option>
                                    <option value="unknown">Belirtmek İstemiyorum</option>
                                </select>
                            </div>
                            <div class="form-group" style="grid-column: 1 / -1;">
                                <label for="settings-colorPattern">Giyim Renk Paletiniz</label>
                                <select id="settings-colorPattern" class="form-control" name="colorPattern" required>
                                    <option value="monochrome">Siyah/Beyaz/Gri (Monokrom) Ağırlıklı</option>
                                    <option value="earth">Toprak ve Pastel Tonları</option>
                                    <option value="colorful">Canlı ve Zıt Renkler</option>
                                    <option value="unknown">Belirtmek İstemiyorum</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block" id="submit-settings-btn">Değişiklikleri Kaydet</button>
                    </form>
                </div>
            </div>
        </div>

    </main>

    <script src="js/config.js" type="module"></script>
    <script src="js/utils.js" type="module"></script>
    <script src="js/api.js" type="module"></script>
    <script src="js/ui.js" type="module"></script>
    <script src="js/main.js" type="module"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap / Kayıt Ol | Kombin.AI</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ─── Animated Mesh Background ─── */
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Moving gradient orbs */
        .auth-orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(60px);
        }

        .auth-orb-1 {
            width: 500px;
            height: 500px;
            top: -150px;
            left: -150px;
            background: radial-gradient(circle, rgba(91,159,217,0.18) 0%, transparent 70%);
            animation: orbDrift1 16s ease-in-out infinite alternate;
        }

        .auth-orb-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -100px;
            background: radial-gradient(circle, rgba(165,211,184,0.18) 0%, transparent 70%);
            animation: orbDrift2 20s ease-in-out infinite alternate;
        }

        .auth-orb-3 {
            width: 300px;
            height: 300px;
            top: 40%;
            right: 20%;
            background: radial-gradient(circle, rgba(147,198,231,0.10) 0%, transparent 70%);
            animation: orbDrift1 24s ease-in-out infinite alternate-reverse;
        }

        @keyframes orbDrift1 {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(60px, 40px) scale(1.12); }
        }

        @keyframes orbDrift2 {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(-50px, -40px) scale(1.1); }
        }

        .back-btn-top {
            position: absolute;
            top: 2rem;
            left: 2rem;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s var(--ease-spring);
            font-size: 0.9rem;
            z-index: 10;
            padding: 0.5rem 0.9rem;
            border-radius: 100px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 2px 8px rgba(26,35,50,0.06);
        }

        .back-btn-top:hover {
            color: var(--accent-primary);
            transform: translateX(-4px);
            box-shadow: 0 4px 16px rgba(91,159,217,0.15);
        }

        .auth-card {
            max-width: 460px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .form-group {
            margin-bottom: 1.4rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            letter-spacing: 0.01em;
        }

        .form-input {
            width: 100%;
            padding: 0.82rem 1rem 0.82rem 1rem;
            border-radius: 14px;
            border: 1.5px solid var(--border-color);
            background: rgba(255, 255, 255, 0.65);
            font-family: var(--font-body);
            font-size: 0.98rem;
            color: var(--text-main);
            transition:
                border-color 0.25s ease,
                box-shadow 0.25s ease,
                background 0.25s ease,
                transform 0.2s var(--ease-spring);
        }

        .form-input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: rgba(255,255,255,0.97);
            box-shadow: 0 0 0 4px rgba(91,159,217,0.14), 0 4px 16px -4px rgba(91,159,217,0.2);
            transform: translateY(-1px);
        }

        /* ─── Premium Auth Button ─── */
        .btn-auth {
            width: 100%;
            padding: 0.95rem;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #5B9FD9 0%, #4a8ec9 60%, #3d7db8 100%);
            color: white;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition:
                transform 0.18s var(--ease-spring),
                box-shadow 0.3s ease,
                background 0.3s ease;
            margin-top: 1.2rem;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.02em;
            box-shadow: 0 6px 20px -4px rgba(91,159,217,0.45);
        }

        /* Shimmer sweep */
        .btn-auth::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(
                105deg,
                transparent 20%,
                rgba(255,255,255,0.32) 50%,
                transparent 80%
            );
            transition: left 0.6s var(--ease-out);
            pointer-events: none;
        }

        .btn-auth:hover::after { left: 160%; }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px -6px rgba(91,159,217,0.55);
            background: linear-gradient(135deg, #6aafdf 0%, #5B9FD9 60%, #4a8ec9 100%);
        }

        .btn-auth:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px -2px rgba(91,159,217,0.3);
        }

        /* Loading state */
        .btn-auth.loading {
            pointer-events: none;
            opacity: 0.82;
        }

        .btn-auth.loading::before {
            content: '';
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: btnSpin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes btnSpin {
            to { transform: rotate(360deg); }
        }

        .auth-footer {
            margin-top: 1.8rem;
            text-align: center;
            font-size: 0.88rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent-primary);
            font-weight: 700;
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        .auth-footer a:hover { opacity: 0.75; }

        .social-auth {
            margin-top: 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.78rem;
            border-radius: 14px;
            border: 1.5px solid var(--border-color);
            background: rgba(255,255,255,0.75);
            color: var(--text-main);
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s var(--ease-spring);
            backdrop-filter: blur(8px);
        }

        .btn-social:hover {
            background: rgba(255,255,255,0.95);
            border-color: rgba(91,159,217,0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(26,35,50,0.08);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.8rem 0;
            color: var(--text-muted);
            font-size: 0.83rem;
            font-weight: 500;
            letter-spacing: 0.04em;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider:not(:empty)::before { margin-right: 1rem; }
        .divider:not(:empty)::after  { margin-left: 1rem; }

        .auth-form {
            display: none;
            animation: fadeInUp 0.4s var(--ease-out) forwards;
        }

        .auth-form.active {
            display: block;
        }

        /* Logo pulse */
        .auth-logo-img {
            width: 44px; height: 44px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(91,159,217,0.25);
            transition: transform 0.4s var(--ease-spring);
        }

        .auth-logo-img:hover {
            transform: scale(1.08) rotate(-3deg);
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 1.5rem 1rem 2rem;
                flex-direction: column;
                justify-content: flex-start;
                align-items: center;
            }
            .back-btn-top {
                position: static;
                align-self: flex-start;
                margin-bottom: 1.5rem;
            }
            .glass-panel.auth-card {
                padding: 1.5rem;
            }
            .auth-tabs {
                gap: 0.5rem;
                padding: 0.3rem;
            }
            .auth-tab {
                padding: 0.6rem;
                font-size: 0.95rem;
            }
            .btn-auth {
                padding: 0.85rem;
                font-size: 1rem;
            }
            .social-auth {
                margin-top: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background Orbs -->
    <div class="auth-orb auth-orb-1" aria-hidden="true"></div>
    <div class="auth-orb auth-orb-2" aria-hidden="true"></div>
    <div class="auth-orb auth-orb-3" aria-hidden="true"></div>

    <div class="auth-container fade-in">
        <a href="index.html" class="back-btn-top">
            <span style="font-size: 1.1rem;">&#8592;</span> Geri Dön
        </a>
        <div class="glass-panel glass-panel--animated auth-card">
            <div style="text-align: center; margin-bottom: 1.8rem;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 10px; font-family: var(--font-heading); font-size: 1.9rem; font-weight: 800; color: var(--accent-primary); margin-bottom: 0.5rem; letter-spacing: -0.5px;">
                    <img src="logo.jpg" alt="Logo" class="auth-logo-img">
                    <span>Kombin.AI</span>
                </div>
                <p id="auth-subtitle">Tekrar hoş geldin! Hesabına giriş yap.</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-target="login-form">Giriş Yap</button>
                <button class="auth-tab" data-target="register-form">Kayıt Ol</button>
            </div>

            <!-- Giriş Formu -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-email">E-posta</label>
                    <input type="email" id="login-email" class="form-input" placeholder="ornek@mail.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Şifre</label>
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth">Giriş Yap</button>
            </form>

            <!-- Kayıt Formu -->
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="register-name">Ad Soyad</label>
                    <input type="text" id="register-name" class="form-input" placeholder="Adınız Soyadınız" required>
                </div>
                <div class="form-group">
                    <label for="register-email">E-posta</label>
                    <input type="email" id="register-email" class="form-input" placeholder="ornek@mail.com" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Şifre</label>
                    <input type="password" id="register-password" class="form-input" placeholder="En az 8 karakter" required>
                </div>
                <button type="submit" class="btn-auth">Hesap Oluştur</button>
            </form>

            <div class="divider">veya</div>

            <div class="social-auth">
                <button class="btn-social">
                    <img src="https://www.google.com/favicon.ico" width="18" alt="Google">
                    Google ile devam et
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initPageTransitions } from './js/page-transitions.js';
        import { initMagneticButtons, initCursorGlow } from './js/animations.js';

        initPageTransitions();

        document.addEventListener('DOMContentLoaded', () => {
            initMagneticButtons();
            initCursorGlow();

            // Add loading effect to auth buttons
            document.querySelectorAll('.btn-auth').forEach(btn => {
                btn.closest('form')?.addEventListener('submit', () => {
                    btn.classList.add('loading');
                    btn.textContent = 'Lütfen bekle…';
                });
            });
        });
    </script>

    <script type="module" src="js/main.js"></script>
</body>
</html>
